name: Artifcat
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: downloading code
        uses: actions/checkout@v4
      - name: file
        run: echo "hello world" > artifact/output.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: artifact/output.txt
   
  download:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: read file
        run: Get-Content artifact/output.txt